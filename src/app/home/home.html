<div class="home-container">
  <!-- Layout principal -->
  <div class="hero">
    <aside class="table-sidebar">
      <p class="sidebar-label">Tablas del sistema</p>
      <ul class="table-name-list">
        <li *ngFor="let section of tableSections" class="table-name-item">
          <span class="table-name">{{ section.name }}</span>
          <span class="table-detail">{{ section.description }}</span>
        </li>
      </ul>
    </aside>

    <div class="hero-content">
      <div class="table-card">
        <h1 class="hero-title">
          Gestion inteligente<br>de inventario
        </h1>
        <p class="hero-description">
          Analiza ventas, optimiza tu surtido y maximiza tu rentabilidad
        </p>
      </div>
    </div>
  </div>
</div>
