<section class="home-menu">
	<div class="page-breadcrumb">
		<p-breadcrumb [model]="items" [home]="home" styleClass="app-breadcrumb"></p-breadcrumb>
	</div>
	<div class="table-header">
		<div class="header-info">
			<h2>Menú principal</h2>
		</div>
		<div class="header-actions">			
			<a routerLink="/products" class="menu-link">
				<button pButton type="button" icon="pi pi-box" label="Productos" class="p-button-text"></button>
			</a>
			<a routerLink="/sales" class="menu-link">
				<button pButton type="button" icon="pi pi-shopping-cart" label="Ventas" class="p-button-text"></button>
			</a>
		</div>
	</div>
</section>
