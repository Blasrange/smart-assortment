<div class="page-breadcrumb-outside">
  <p-breadcrumb [model]="breadcrumbItems" [home]="breadcrumbHome" styleClass="app-breadcrumb"></p-breadcrumb>
</div>

<section class="products-page">
  <p-table #dt [value]="products()" [(selection)]="selectedProducts" dataKey="id" [rowHover]="true" [rows]="10"
    [showCurrentPageReport]="true" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading()" [paginator]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} productos" [filterDelay]="0"
    [globalFilterFields]="['id', 'title', 'price', 'quantity', 'total']" styleClass="p-datatable-sm">

    <!-- 🔝 HEADER PRO -->
    <ng-template #caption>
      <div class="table-header">
        <div class="header-info">
          <h2>Productos</h2>
        </div>

        <div class="header-actions">
          <p-iconField iconPosition="left">
            <p-inputIcon>
              <i class="pi pi-search"></i>
            </p-inputIcon>

            <input pInputText type="text" [(ngModel)]="searchValue"
              (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Buscar producto..."
              class="search-input" />
          </p-iconField>

          <button pButton icon="pi pi-filter-slash" class="p-button-outlined" (click)="clearFilters(dt)"
            pTooltip="Limpiar filtros"></button>


          <button pButton icon="pi pi-plus" class="p-button-success new-product-btn" (click)="openCreateProduct()"
            pTooltip="Crear producto">Nuevo</button>

        </div>
      </div>
    </ng-template>

    <!-- 🧱 COLUMNAS PRO -->
    <ng-template #header>
      <tr>
        <th style="width: 3rem">
          <p-tableHeaderCheckbox />
        </th>

        <th pSortableColumn="id">
          <div class="column-header">
            <span>ID</span>
            <div class="column-controls">
              <p-sortIcon field="id" />
              <p-columnFilter type="text" field="id" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="sku">
          <div class="column-header">
            <span>SKU</span>
            <div class="column-controls">
              <p-sortIcon field="sku" />
              <p-columnFilter type="text" field="sku" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="description">
          <div class="column-header">
            <span>Descripción</span>
            <div class="column-controls">
              <p-sortIcon field="description" />
              <p-columnFilter type="text" field="description" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="category">
          <div class="column-header">
            <span>Categoría</span>
            <div class="column-controls">
              <p-sortIcon field="category" />
              <p-columnFilter type="text" field="category" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="discountPercentage">
          <div class="column-header">
            <span>Descuento</span>
            <div class="column-controls">
              <p-sortIcon field="discountPercentage" />
              <p-columnFilter type="numeric" field="discountPercentage" display="menu" />
            </div>
          </div>
        </th>


        <th pSortableColumn="price">
          <div class="column-header">
            <span>Precio</span>
            <div class="column-controls">
              <p-sortIcon field="price" />
              <p-columnFilter type="numeric" field="price" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="quantity">
          <div class="column-header">
            <span>Cantidad</span>
            <div class="column-controls">
              <p-sortIcon field="quantity" />
              <p-columnFilter type="numeric" field="quantity" display="menu" />
            </div>
          </div>
        </th>

        <th pSortableColumn="actions">
          <div class="column-header">
            <span>Acciones</span>
            <div class="column-controls">
              <p-sortIcon field="actions" />
            </div>
          </div>
        </th>

      </tr>
    </ng-template>

    <!-- 📦 FILAS PRO -->
    <ng-template #body let-products>
      <tr class="p-selectable-row">
        <td>
          <p-tableCheckbox [value]="products" />
        </td>
        <td>
          <span class="user-id-badge">{{ products.id }}</span>
        </td>
        <td>
          <i class="pi pi-barcode"></i>
          {{ products.sku }}
        </td>
        <td>
          <i class="pi pi-tag"></i>
          {{ products.title }}
        </td>
        <td>
          <i class="pi pi-tags"></i>
          {{ products.category }}
        </td>
        <td>
          <i class="pi pi-percentage"></i>
          {{ products.discountPercentage }}
        </td>
        <td>
          <i class="pi pi-dollar"></i>
          {{ products.price }}
        </td>
        <td class="text-center">
          <i class="pi pi-sort-numeric-up"></i>
          <span class="age-badge">{{ products.stock }}</span>
        </td>
        <td>
          <button pButton icon="pi pi-pencil" class="p-button-text p-button-sm" (click)="openEditProduct(products)"
            pTooltip="Editar"></button>
          <button pButton icon="pi pi-ban" class="p-button-text p-button-sm p-button-danger"
            (click)="inactivateProduct(products)" pTooltip="Inactivar"></button>
        </td>
      </tr>
    </ng-template>

    <!-- 📭 VACÍO PRO -->
    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="empty-message">
          <i class="pi pi-shopping-products"></i>
          <p>No se encontraron carritos</p>
        </td>
      </tr>
    </ng-template>

  </p-table>

  <!-- Modal crear producto -->
  <app-create [visible]="showCreateModal()" [product]="editingProduct" (save)="saveCreateProduct($event)"
    (cancel)="cancelCreate()"></app-create>

  <!-- Modal editar producto -->
  <app-edit [visible]="showEditModal()" [product]="editingProduct" (save)="saveEditProduct($event)"
    (cancel)="cancelEdit()"></app-edit>
</section>
